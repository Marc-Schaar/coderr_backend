name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/tests.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: DEPLOY_PATH
          sync: true
          script: |
            set -e
            cd "$DEPLOY_PATH"

            echo "Fetching latest changes..."
            git fetch --all
            git pull --ff-only origin master

            echo "Building image and restarting container..."
            # Migrations and static-file collection happen automatically:
            # migrate runs in entrypoint.sh on container start, collectstatic
            # is baked into the image at build time.
            docker compose -f docker-compose.prod.yml up -d --build

            echo "Cleaning up dangling images..."
            docker image prune -f
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

services:
  web:
    build: .
    image: coderr-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    # PostgreSQL runs directly on the host, not in a container. Host
    # networking lets the container reach it via "localhost" like any other
    # process on the host, instead of juggling Docker bridge IPs/pg_hba
    # rules. Trade-off: no port isolation from Docker's side, so gunicorn
    # must bind to 127.0.0.1 itself (see GUNICORN_BIND below) to stay off
    # the public interface - the host's reverse proxy is what terminates
    # TLS and forwards to it.
    network_mode: host
    environment:
      - GUNICORN_BIND=127.0.0.1:8002
    volumes:
      - media:/usr/src/app/media

volumes:
  media:
